<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">CruxOS project cover</title>
  <desc id="desc">Minimal title card for the CruxOS project.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="980" cy="140" r="180" fill="#60a5fa" opacity="0.08"/>
  <circle cx="220" cy="590" r="220" fill="#38bdf8" opacity="0.06"/>

  <text x="600" y="332" text-anchor="middle" fill="#f8fafc"
    font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700">CruxOS</text>
  <text x="600" y="394" text-anchor="middle" fill="#cbd5e1"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28">
    climbing performance tracking and insights
  </text>
</svg>
