<svg xmlns="http://www.w3.org/2000/svg" width="560" height="640" viewBox="0 0 560 640" role="img"
    aria-labelledby="title desc">
    <title id="title">Latch logo card</title>
    <desc id="desc">A minimal dark title card with a stylized blue L monogram for the Latch project.</desc>

    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0d1320" />
            <stop offset="100%" stop-color="#090d16" />
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#60a5fa" />
            <stop offset="100%" stop-color="#2563eb" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.35" />
        </filter>
    </defs>

    <rect x="0" y="0" width="560" height="640" rx="28" fill="url(#bg)" />
    <circle cx="280" cy="250" r="138" fill="#121a2a" opacity="0.9" />
    <circle cx="280" cy="250" r="137" fill="none" stroke="#1f2a44" />

    <g filter="url(#shadow)">
        <rect x="214" y="152" width="60" height="196" rx="22" fill="url(#accent)" />
        <rect x="214" y="288" width="136" height="60" rx="22" fill="url(#accent)" />
    </g>

    <rect x="178" y="392" width="204" height="1" fill="#1f2a44" />
    <text x="280" y="462" text-anchor="middle" font-size="42" font-weight="700" fill="#f8fafc"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Latch</text>
    <text x="280" y="500" text-anchor="middle" font-size="18" fill="#8da2c0"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Local-first focus blocker</text>
</svg>
